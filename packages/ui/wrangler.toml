# BillClaw UI - Cloudflare Workers configuration
# https://developers.cloudflare.com/workers/wrangler/configuration/
#
# Unified UI + API service for Cloudflare Workers deployment
# Combines React SPA with Hono API server

name = "billclaw-ui"
main = "src/server/index.ts"
compatibility_date = "2025-09-15"
compatibility_flags = ["nodejs_compat_v2"]

# Static assets (React SPA build output)
[assets]
directory = "dist"
not_found_handling = "single-page-application"

# D1 Database (shared with billclaw-worker)
[[d1_databases]]
binding = "DB"
database_name = "billclaw-data"
database_id = "ae67cab3-392b-4f46-b783-9a8e32b6250f"

# KV Namespace (shared with billclaw-worker)
[[kv_namespaces]]
binding = "CONFIG"
id = "59865e1e3cb34909ade239a6423f7fec"

# Environment variables (non-sensitive defaults)
[vars]
PLAID_ENV = "sandbox"
# Service toggles (default enabled)
BILLCLAW_ENABLED = "true"
FIRELA_BOT_ENABLED = "true"

# Secrets (set in Cloudflare dashboard after deploy)
# Required secrets:
# - PLAID_CLIENT_ID: Your Plaid client ID from dashboard.plaid.com
# - PLAID_SECRET: Your Plaid secret key (sandbox/development/production)
# - PLAID_WEBHOOK_SECRET: Secret for verifying Plaid webhooks
# - JWT_SECRET: Secret key for JWT tokens (any random 32+ char string)

# Development settings
[dev]
port = 8787
local_protocol = "http"

# Module aliasing - replace Node.js native modules with Workers-compatible shims
# These modules are not fully supported in Workers local mode (workerd)
# The shims provide stubs or minimal implementations
[alias]
"node:fs" = "./src/server/shims/node-fs.ts"
"node:fs/promises" = "./src/server/shims/node-fs.ts"
"node:os" = "./src/server/shims/node-os.ts"
"node:path" = "./src/server/shims/node-path.ts"
"node:readline" = "./src/server/shims/node-readline.ts"
keytar = "./src/server/shims/keytar.ts"

# Production settings (configure after first deploy)
# [env.production]
# routes = [
#   { pattern = "billclaw.example.com/*", zone_name = "example.com" }
# ]
