# Firela Bot Cloudflare Worker configuration
# https://developers.cloudflare.com/workers/wrangler/configuration/
#
# Deploy Button: Click to deploy to your Cloudflare account
# https://deploy.workers.cloudflare.com/?url=https://github.com/fire-la/firela-bot/tree/main/packages/firela-bot/worker

name = "firela-bot"
main = "dist/worker.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat_v2"]

# ============================================================================
# Resource Bindings (auto-provisioned by Deploy Button)
# ============================================================================
# Deploy Button uses Automatic Provisioning (Beta) to create resources.
# When IDs are omitted, Cloudflare creates resources automatically.
# See: https://developers.cloudflare.com/workers/wrangler/configuration/#automatic-provisioning

# D1 Database for memory storage
[[d1_databases]]
binding = "DB"
database_name = "firela-memory"
database_id = "575adfe2-38ec-4849-86b6-313eaeb6ed9d"

# KV Namespace for conversation history
[[kv_namespaces]]
binding = "CONVERSATION_KV"
id = "078b1d7583954002a50f5d7df2821555"

# Vectorize for semantic search (optional - requires manual setup)
# Note: Vectorize indexes must be created manually before first deploy:
#   wrangler vectorize create firela-memory --dimensions=768 --metric=cosine
# After creating the index, uncomment and add the index_name:
# [[vectorize]]
# binding = "VECTORIZE"
# index_name = "firela-memory"

# Environment variables (non-sensitive defaults)
[vars]
ENVIRONMENT = "production"
RELAY_URL = "https://napi-dev.firela.io"

# Secrets (configure in Cloudflare dashboard after deploy)
# Required secrets:
# - DISCORD_PUBLIC_KEY: Your Discord application public key
# - DISCORD_BOT_TOKEN: Your Discord bot token
# - DISCORD_APPLICATION_ID: Your Discord application ID
# - FIRELA_BOT_API_KEY: Your Firela Bot API key from firela.io/dashboard

# Development settings
[dev]
port = 8788
local_protocol = "http"

# Production settings (configure after first deploy)
# [env.production]
# routes = [
#   { pattern = "firela-bot.example.com/*", zone_name = "example.com" }
# ]
