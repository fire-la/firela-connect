# BillClaw Cloudflare Worker configuration
# https://developers.cloudflare.com/workers/wrangler/configuration/
#
# Deploy Button: Click to deploy to your Cloudflare account
# https://deploy.workers.cloudflare.com/?url=https://github.com/fire-la/billclaw/tree/main/packages/cloudflare-worker

name = "billclaw-worker"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# D1 Database (auto-provisioned by Deploy Button)
# On first deploy, Cloudflare will create a new D1 database automatically
[[d1_databases]]
binding = "DB"
database_name = "billclaw-data"
database_id = "will-be-created-on-deploy"

# KV Namespace for config and rate limiting (auto-provisioned)
[[kv_namespaces]]
binding = "CONFIG"
id = "will-be-created-on-deploy"

# Environment variables (non-sensitive defaults)
[vars]
PLAID_ENV = "sandbox"

# Secrets (set in Cloudflare dashboard after deploy)
# Required secrets:
# - PLAID_CLIENT_ID: Your Plaid client ID from dashboard.plaid.com
# - PLAID_SECRET: Your Plaid secret key (sandbox/development/production)
# - JWT_SECRET: Secret key for JWT tokens (any random 32+ char string)
# - SETUP_PASSWORD: One-time password for initial API token setup

# Development settings
[dev]
port = 8787
local_protocol = "http"

# Production settings (configure after first deploy)
# [env.production]
# routes = [
#   { pattern = "billclaw.example.com/*", zone_name = "example.com" }
# ]
