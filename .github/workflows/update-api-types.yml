name: Update API Types

on:
  schedule:
    # Run daily at 6 AM UTC
    - cron: '0 6 * * *'
  workflow_dispatch:
    # Allow manual trigger
  repository_dispatch:
    # Triggered by api-specs repo when new version is published
    types: [api-types-updated]

jobs:
  update-types:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Check for updates
        id: check
        run: |
          CURRENT=$(pnpm list @firela/api-types --json | jq -r '.[] | .dependencies["@firela/api-types"].version' 2>/dev/null || echo "not-found")
          LATEST=$(npm view @firela/api-types version)
          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          echo "latest=$LATEST" >> $GITHUB_OUTPUT
          if [ "$CURRENT" != "$LATEST" ]; then
            echo "needs_update=true" >> $GITHUB_OUTPUT
          fi

      - name: Update @firela/api-types
        if: steps.check.outputs.needs_update == 'true'
        run: |
          pnpm update @firela/api-types
          pnpm install

      - name: Type check
        if: steps.check.outputs.needs_update == 'true'
        run: pnpm -r --filter './packages/**' exec tsc --noEmit

      - name: Create Pull Request
        if: steps.check.outputs.needs_update == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: update @firela/api-types to ${{ steps.check.outputs.latest }}'
          title: 'chore: update @firela/api-types to ${{ steps.check.outputs.latest }}'
          body: |
            ## API Types Update

            Updates `@firela/api-types` from `${{ steps.check.outputs.current }}` to `${{ steps.check.outputs.latest }}`.

            ### Changes
            Check the [api-specs releases](https://github.com/fire-la/api-specs/releases) for details.

            ### Verification
            - [x] TypeScript compiles without errors
            - [ ] Manual testing recommended
          branch: update/api-types
          labels: dependencies, automated
