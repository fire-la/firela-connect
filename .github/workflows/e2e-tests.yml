# E2E Tests Workflow
#
# Runs Playwright E2E tests on push, pull requests, and scheduled daily.
# Tests are stored in the billclaw-docs/testing submodule.
#
# Schedule: Daily at UTC 6:00 (Beijing 14:00)

name: E2E Tests

on:
  schedule:
    - cron: "0 6 * * *" # Daily at UTC 6:00 (Beijing 14:00)
  push:
    branches: [main]
    paths:
      - "packages/**"
      - "billclaw-docs/testing/**"
  pull_request:
    branches: [main]
    paths:
      - "packages/**"
      - "billclaw-docs/testing/**"
  workflow_dispatch:

jobs:
  e2e:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create test config
        run: |
          mkdir -p ~/.firela/billclaw
          cat > ~/.firela/billclaw/config.json << 'EOF'
          {
            "version": 1,
            "connect": {
              "port": 4456,
              "host": "localhost"
            },
            "plaid": {
              "environment": "sandbox"
            },
            "storage": {
              "path": "~/.firela/billclaw"
            }
          }
          EOF
          echo "Created test config at ~/.firela/billclaw/config.json"
          cat ~/.firela/billclaw/config.json

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build packages
        run: pnpm build

      - name: Run E2E tests
        run: npx playwright test --config billclaw-docs/testing/playwright.config.ts
        env:
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: billclaw-docs/testing/playwright-report/
          retention-days: 30

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: billclaw-docs/testing/test-results/
          retention-days: 30
