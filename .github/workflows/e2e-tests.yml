# E2E Tests Workflow
#
# Runs Playwright E2E tests on push, pull requests, and scheduled daily.
# Tests are stored in the billclaw-docs/testing submodule.
#
# Schedule: Daily at UTC 6:00 (Beijing 14:00)

name: E2E Tests

on:
  schedule:
    - cron: "0 6 * * *" # Daily at UTC 6:00 (Beijing 14:00)
  push:
    branches: [main]
    paths:
      - "packages/**"
      - "billclaw-docs/testing/**"
  pull_request:
    branches: [main]
    paths:
      - "packages/**"
      - "billclaw-docs/testing/**"
  workflow_dispatch:

jobs:
  e2e:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.SUBMODULE_PAT || github.token }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create test config
        run: |
          mkdir -p ~/.firela/billclaw
          cat > ~/.firela/billclaw/config.json << 'EOF'
          {
            "version": 1,
            "connect": {
              "port": 4456,
              "host": "localhost"
            },
            "plaid": {
              "clientId": "${{ secrets.PLAID_CLIENT_ID }}",
              "secret": "${{ secrets.PLAID_SECRET }}",
              "environment": "sandbox"
            },
            "storage": {
              "path": "~/.firela/billclaw"
            }
          }
          EOF
          echo "Created test config at ~/.firela/billclaw/config.json"
          # Don't print config as it contains secrets

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build packages
        run: pnpm build

      - name: Run E2E tests
        run: npx playwright test --config billclaw-docs/testing/playwright.config.ts
        env:
          CI: true

      - name: Run Healer on failed tests
        if: failure()
        run: |
          echo "Running Healer Agent to diagnose and fix failed tests..."
          echo "Note: Healer requires Claude Code CLI with Agent support"
          echo "Install Claude Code CLI and run: claude agent playwright-test-healer"
          echo "For now, skipping auto-heal in CI - check the test results manually"
        env:
          CI: true
          # Claude Code CLI Configuration (uses 智谱 AI endpoint)
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
          ANTHROPIC_BASE_URL: https://open.bigmodel.cn/api/anthropic
          API_TIMEOUT_MS: "3000000"
          ANTHROPIC_DEFAULT_HAIKU_MODEL: glm-5
          ANTHROPIC_DEFAULT_SONNET_MODEL: glm-5
          ANTHROPIC_DEFAULT_OPUS_MODEL: glm-4.5-air
          CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1"

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: billclaw-docs/testing/playwright-report/
          retention-days: 30

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: billclaw-docs/testing/test-results/
          retention-days: 30
