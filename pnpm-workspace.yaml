# BillClaw Monorepo Workspace Configuration
# Supports nested packages under billclaw/ for product organization
packages:
  # Shared packages at root level
  - 'packages/runtime-adapters'
  # BillClaw product (nested structure)
  - 'packages/billclaw/*'
  # Standalone packages
  - 'packages/ui'
  # Future: Firela-Bot
  - 'packages/firela-bot'
